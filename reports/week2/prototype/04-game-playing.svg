<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <rect width="1280" height="800" fill="#CCEBFF"/>
  <ellipse cx="200" cy="150" rx="70" ry="30" fill="#FFFFFF"/>
  <ellipse cx="1080" cy="120" rx="85" ry="36" fill="#FFFFFF"/>
  <g id="hud">
    <rect x="40" y="32" width="140" height="52" rx="26" fill="#FFFFFF"/>
    <text x="110" y="66" font-family="Inter" font-size="24" font-weight="700" fill="#1B2A4A" text-anchor="middle">⭐ 0</text>
    <rect x="200" y="32" width="210" height="52" rx="26" fill="#FFFFFF"/>
    <text x="305" y="65" font-family="Inter" font-size="22" fill="#1F5AB3" text-anchor="middle">Space words</text>
    <g id="pill-listening">
      <rect x="1010" y="32" width="230" height="52" rx="26" fill="#27AE60"/>
      <text x="1125" y="65" font-family="Inter" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">🎤 Listening...</text>
    </g>
  </g>
  <g id="target-word">
    <rect x="440" y="120" width="400" height="130" rx="28" fill="#FFFFFF" stroke="#FFB100" stroke-width="4"/>
    <text x="640" y="165" font-family="Inter" font-size="20" fill="#8C949F" text-anchor="middle">Say the word:</text>
    <text x="640" y="225" font-family="Inter" font-size="56" font-weight="700" fill="#1B2A4A" text-anchor="middle">ROCKET 🚀</text>
  </g>
  <g id="road">
    <rect y="420" width="1280" height="380" fill="#546E7A"/>
    <line x1="426" y1="420" x2="426" y2="800" stroke="#FFFFFF" stroke-width="6" stroke-dasharray="30 26" opacity="0.7"/>
    <line x1="853" y1="420" x2="853" y2="800" stroke="#FFFFFF" stroke-width="6" stroke-dasharray="30 26" opacity="0.7"/>
  </g>
  <g id="lane-star">
    <rect x="93" y="448" width="240" height="44" rx="22" fill="#1E8A4C"/>
    <text x="213" y="478" font-family="Inter" font-size="30" font-weight="700" fill="#FFFFFF" text-anchor="middle">STAR</text>
  </g>
  <g id="lane-rocket">
    <rect x="520" y="448" width="240" height="44" rx="22" fill="#1E8A4C"/>
    <text x="640" y="478" font-family="Inter" font-size="30" font-weight="700" fill="#FFFFFF" text-anchor="middle">ROCKET</text>
  </g>
  <g id="lane-moon">
    <rect x="947" y="448" width="240" height="44" rx="22" fill="#1E8A4C"/>
    <text x="1067" y="478" font-family="Inter" font-size="30" font-weight="700" fill="#FFFFFF" text-anchor="middle">MOON</text>
  </g>
  <g id="car">
    <rect x="173" y="566" width="80" height="44" rx="14" fill="#C0392B"/>
    <rect x="183" y="574" width="60" height="28" rx="8" fill="#CCEBFF"/>
    <rect x="143" y="600" width="140" height="56" rx="16" fill="#EB5757"/>
    <circle cx="171" cy="660" r="18" fill="#1B2A4A"/>
    <circle cx="171" cy="660" r="7" fill="#EDF1F5"/>
    <circle cx="255" cy="660" r="18" fill="#1B2A4A"/>
    <circle cx="255" cy="660" r="7" fill="#EDF1F5"/>
  </g>
  <text x="640" y="745" font-family="Inter" font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="middle">Say a lane's word to steer the car there!</text>
  <text x="24" y="780" font-family="Inter" font-size="14" fill="#FFFFFF">04 · Game - playing (US-03, US-04)</text>
</svg>
