name: Link check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly safety net: Mondays 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lychee:
    name: Lychee link checker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # lychee.toml holds accepted statuses and justified exclusions.
          args: --config lychee.toml --no-progress --verbose './**/*.md' './index.html'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
